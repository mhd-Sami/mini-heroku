<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mini-Heroku Active Deployments. Monitor status, resource metrics, and lifecycle commands.">
  <title>Vessel | Active Deployments</title>
  <link rel="icon" type="image/x-icon" href="/assets/vessel.ico">
  <!-- Google Fonts: Inter and Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Auth Navigation Guard & Common Header Renderer -->
  <script src="js/nav.js"></script>
</head>

<body>
  <!-- Header mounted dynamically via nav.js -->
  <header class="app-header" id="app-header"></header>

  <main class="dashboard-container">
    <div class="workspace-grid" style="grid-template-columns: 1fr;">
      <!-- Active App Grid Panel -->
      <section class="workspace-card grid-section" aria-labelledby="grid-heading">
        <div class="card-header">
          <h2 id="grid-heading">Active Deployments</h2>
          <p class="card-subtitle">Manage and monitor running containers</p>
        </div>

        <!-- Empty state placeholder -->
        <div id="empty-state" class="empty-state">
          <div class="empty-icon-svg">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h3>No applications deployed</h3>
          <p>Go to the Dashboard page to launch your first service.</p>
          <a href="index.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-flex;">Go to Dashboard</a>
        </div>

        <div id="apps-grid" class="apps-grid hidden">
          <!-- Dynamically populated app cards -->
        </div>
      </section>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-container">
      <p>Mini-Heroku PaaS • Powered by Traefik, Docker, and FastAPI</p>
    </div>
  </footer>

  <script type="module" src="js/apps.js"></script>
</body>
</html>
