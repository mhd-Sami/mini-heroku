<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mini-Heroku Account Settings. View your active profile metadata and manage security options.">
  <title>Vessel | Account Settings</title>
  <link rel="icon" type="image/x-icon" href="/assets/vessel.ico">
  <!-- Google Fonts: Inter and Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Supabase modular CDN importmap mapping -->
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
      }
    }
  </script>
  <!-- Auth Navigation Guard & Common Header Renderer -->
  <script src="js/nav.js"></script>
</head>
<body>
  <!-- Header mounted dynamically via nav.js -->
  <header class="app-header" id="app-header"></header>

  <main class="dashboard-container">
    <div class="workspace-grid" style="grid-template-columns: 1fr;">
      <!-- Profile Metadata Card -->
      <section class="workspace-card" aria-labelledby="profile-heading">
        <div class="card-header">
          <h2 id="profile-heading">Account Information</h2>
          <p class="card-subtitle">Manage your profile credentials and security configurations</p>
        </div>

        <div class="config-panel" style="max-width: 600px; margin-bottom: 2rem;">
          <div class="config-info-list">
            <div><strong>Email Address:</strong> <span id="profile-email">--</span></div>
            <div><strong>Username:</strong> <span id="profile-username-display">--</span></div>
            <div><strong>Active Auth Method:</strong> <span id="profile-provider">--</span></div>
            <div><strong>User UID:</strong> <span id="profile-uid">--</span></div>
            <div><strong>Session State:</strong> <span id="profile-status">Connected</span></div>
          </div>
        </div>

        <div class="security-operations" style="border-top: 1px solid var(--color-bg-alt); padding-top: 2rem;">
          <h3>Security Management</h3>
          <p class="card-subtitle" style="margin-bottom: 1.25rem;">Update your account password</p>
          
          <form id="change-password-form" class="auth-form" style="max-width: 400px; margin-bottom: 1.5rem;">
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem;">
              <label for="change-new-password" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-main);">New Password</label>
              <input type="password" id="change-new-password" placeholder="••••••••" required style="height: 2.5rem; padding: 0 1rem; border-radius: var(--radius-sm); border: 1px solid var(--color-bg-alt); background-color: var(--color-bg-cream); color: var(--color-text-main);">
            </div>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.5rem;">
              <label for="change-confirm-password" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-main);">Confirm New Password</label>
              <input type="password" id="change-confirm-password" placeholder="••••••••" required style="height: 2.5rem; padding: 0 1rem; border-radius: var(--radius-sm); border: 1px solid var(--color-bg-alt); background-color: var(--color-bg-cream); color: var(--color-text-main);">
            </div>
            <button type="submit" id="btn-submit-change-password" class="btn btn-primary" style="padding: 0.6rem 1.25rem;">Update Password</button>
          </form>
          
          <div id="change-success" class="auth-message success-message hidden"></div>
          <div id="change-error" class="auth-message error-message hidden"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-container">
      <p>Vessel PaaS • Powered by Traefik, Docker, and FastAPI</p>
    </div>
  </footer>

  <script type="module" src="js/account.js"></script>
</body>
</html>
