<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mini-Heroku Account Settings. View your active profile metadata and manage security options.">
  <title>Mini-Heroku | Account Settings</title>
  <!-- Google Fonts: Inter and Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Supabase modular CDN importmap mapping -->
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
      }
    }
  </script>
  <!-- Auth Navigation Guard & Common Header Renderer -->
  <script src="js/nav.js"></script>
</head>
<body>
  <!-- Header mounted dynamically via nav.js -->
  <header class="app-header" id="app-header"></header>

  <main class="dashboard-container">
    <div class="workspace-grid" style="grid-template-columns: 1fr;">
      <!-- Profile Metadata Card -->
      <section class="workspace-card" aria-labelledby="profile-heading">
        <div class="card-header">
          <h2 id="profile-heading">Account Information</h2>
          <p class="card-subtitle">Manage your profile credentials and security configurations</p>
        </div>

        <div class="config-panel" style="max-width: 600px; margin-bottom: 2rem;">
          <div class="config-info-list">
            <div><strong>Email Address:</strong> <span id="profile-email">--</span></div>
            <div><strong>Active Auth Method:</strong> <span id="profile-provider">--</span></div>
            <div><strong>User UID:</strong> <span id="profile-uid">--</span></div>
            <div><strong>Session State:</strong> <span id="profile-status">Connected</span></div>
          </div>
        </div>

        <div class="security-operations" style="border-top: 1px solid var(--color-bg-alt); padding-top: 2rem;">
          <h3>Security Management</h3>
          <p class="card-subtitle" style="margin-bottom: 1.25rem;">Update your account credentials</p>
          
          <button class="btn btn-primary" id="btn-trigger-reset">Send Password Reset Email</button>
          
          <div id="reset-success" class="auth-message success-message hidden"></div>
          <div id="reset-error" class="auth-message error-message hidden"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-container">
      <p>Mini-Heroku PaaS • Powered by Traefik, Docker, and FastAPI</p>
    </div>
  </footer>

  <script type="module" src="js/account.js"></script>
</body>
</html>
